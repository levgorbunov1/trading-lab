name: Run Trading Bot

on:
  # schedule:
  #   # Runs twice per day (09:00 and 21:00 UTC)
  #   - cron: "0 9,21 * * *"
  workflow_dispatch:

concurrency:
  group: trading-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      API_KEY: ${{ secrets.API_KEY }}
      API_SECRET: ${{ secrets.API_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install alpaca-trade-api

      - name: Run trading bot
        run: |
          python main.py

      - name: Check if state.json changed
        id: statecheck
        run: |
          if git diff --quiet state.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git config --global user.name "github-actions"
            git config --global user.email "actions@github.com"
            git add state.json
            git commit -m "Update trading state"
          fi

      - name: Create Pull Request
        if: steps.statecheck.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update trading state"
          title: "Update trading state"
          body: "Automated state update from trading bot"
          branch: "update-state-${{ github.run_id }}"